name: Bump formula

# Detects new gistui releases via `brew livecheck` and opens a PR bumping the
# formula's url + sha256. Mirrors the Scoop bucket's Excavator: third-party taps
# self-host this, since Homebrew's BrewTestBot only services homebrew-core.
#
# Requires a repository secret HOMEBREW_BUMP_TOKEN — a Personal Access Token,
# NOT the default GITHUB_TOKEN (the action rejects it). Classic PAT with
# `public_repo` + `workflow`, or a fine-grained token scoped to this tap with
# Contents: read/write and Pull requests: read/write.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  bump:
    name: Bump gistui
    runs-on: ubuntu-latest
    env:
      # The action taps this repo fresh, which Homebrew 6.0.0 treats as untrusted
      # and refuses to load (see README "Tap trust"). Since this is our own tap
      # driving its own automation, disable the trust requirement for the run.
      # (Deprecated upstream; if removed, add a pre-step `brew tap akunzai/homebrew-tap`
      # + `brew trust --formula akunzai/homebrew-tap/gistui` before the action.)
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
      - name: Bump gistui formula
        uses: dawidd6/action-homebrew-bump-formula@v7
        with:
          token: ${{ secrets.HOMEBREW_BUMP_TOKEN }}
          no_fork: true
          tap: akunzai/homebrew-tap
          formula: gistui
          livecheck: true
